name: Deploy to Netlify

# The game is uploaded from GitHub's runners (which have network access),
# then published to the pre-created Netlify site "lab-escape-outbreak".
# Requires repo secret NETLIFY_AUTH_TOKEN (Netlify > User settings >
# Applications > Personal access tokens).
on:
  push:
    branches: [main, claude/scary-lab-escape-game-zvrghx]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site to Netlify (production)
        run: |
          npx --yes netlify-cli@latest deploy \
            --dir . \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --prod \
            --message "Deploy from GitHub Actions (${{ github.sha }})"
        env:
          NETLIFY_SITE_ID: c9ed938b-8e45-4ef9-9186-9f416e3ea080
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
