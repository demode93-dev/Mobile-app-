<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b1a0f" />
  <title>Dungeon Sweeper</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      /* manipulation: allow pinch-zoom and panning (so players can size the
         game themselves) while still suppressing double-tap-to-zoom, which
         would otherwise trigger accidentally during fast tapping. */
      touch-action: manipulation;
    }
    #game-container {
      width: 100%;
      /* dvh tracks the *actually visible* viewport height on mobile browsers
         (excluding the address bar / bottom toolbar). Plain vh measures the
         height as if that browser chrome were hidden, which is taller than
         what's on screen and left the canvas visibly undersized with bars
         on the sides even on an exact-fit device. vh stays as the fallback
         for browsers that don't support dvh yet. */
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!--
    Google H5 Games Ads (Ad Placement API) bootstrap shim. This just defines
    the queue + adConfig call the real SDK expects - it's safe to run even
    with no publisher ID configured, since nothing ever drains the queue
    until the real script (loaded conditionally by AdSenseProvider.js, see
    below) shows up. VITE_ADSENSE_CLIENT_ID unset -> AdSenseProvider never
    injects that script -> AdSenseProvider.configured stays false ->
    BootScene falls back to AdManager's mock provider automatically.
  -->
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    window.adBreak = window.adConfig = function (o) { window.adsbygoogle.push(o); };
    adConfig({ preloadAdBreaks: 'on', sound: 'on' });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
